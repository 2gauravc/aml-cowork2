services:
  app:
    build:
      context: .
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - app_outputs:/app/outputs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  app_outputs:
  caddy_data:
  caddy_config:
